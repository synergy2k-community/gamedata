name: Purge jsDelivr

# Game data is served via jsDelivr's floating @main ref, which the CDN caches for
# ~12h. After a push, purge the changed files so users see the update on their
# next app load instead of waiting out the cache.
on:
  push:
    branches: [main]
    paths:
      - '**.json'

# One purge at a time; let an in-flight run finish (don't cancel) so no change
# is skipped.
concurrency:
  group: purge-jsdelivr
  cancel-in-progress: false

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the previous commit to diff changed files

      - name: Collect changed JSON files
        id: changed
        run: |
          set -euo pipefail
          base='${{ github.event.before }}'
          # First push / force-push / new branch: before may be all-zeros or gone.
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi
          if [ -n "$base" ]; then
            files="$(git diff --name-only "$base" HEAD -- '*.json')"
          else
            files="$(git ls-files '*.json')"
          fi
          echo "Changed JSON files:"; echo "${files:-<none>}"
          { echo 'files<<EOF'; echo "$files"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

      - name: Purge changed files on jsDelivr
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Pass changed files as args; the script always adds manifest.json and
          # dedupes. A push touching only non-JSON files won't reach this job.
          mapfile -t files < <(printf '%s\n' '${{ steps.changed.outputs.files }}' | sed '/^$/d')
          ./scripts/purge-jsdelivr.sh "${files[@]}"
